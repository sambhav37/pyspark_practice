[DEFAULT]
# Infrastructure Configs
spark.hadoop.fs.s3a.endpoint=http://minio:9000
spark.hadoop.fs.s3a.access.key=admin
spark.hadoop.fs.s3a.secret.key=password
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled=false
spark.sql.legacy.timeParserPolicy=CORRECTED
spark.jars.packages=org.apache.hadoop:hadoop-aws:3.3.4


# Application Configs - Simulated Wikipedia
spark.app.checkpoint_dir=checkpoints/wikipedia_edits_checkpoint
spark.app.output_path=s3a://sampra/output/streaming/page_counts
spark.app.kafka_bootstrap_servers=kafka:9092
spark.app.kafka_topic=wikipedia-edits

# Application Configs - Real Wikimedia
spark.app.wikimedia_checkpoint_dir=checkpoints/wikimedia_edits_checkpoint
spark.app.wikimedia_output_path=s3a://sampra/output/streaming/wikimedia_page_counts
spark.app.wikimedia_kafka_topic=wikimedia-edits